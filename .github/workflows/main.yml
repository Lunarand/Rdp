name: RDP (Pinggy Tunnel + Brave + Chrome + WinRAR + FFmpeg)

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # --- AUDIO & SESSION FIXES START HERE ---
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force
          # KEEP SESSION ACTIVE IN BACKGROUND
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force
          # --- FIXES END HERE ---

          # Enable Remote Desktop and disable Network Level Authentication
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Firewall rule for RDP
          netsh advfirewall firewall delete rule name="RDP-Pinggy"
          netsh advfirewall firewall add rule name="RDP-Pinggy" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if (-not $env:MY_SECRET_PASS) {
              Write-Error "Error: Secret 'PASS' is empty or missing. Please add it in Repository Settings."
              exit 1
          }
          $password = $env:MY_SECRET_PASS
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_CREDS=User: RDP | Password: (Hidden - Check your Secrets)" >> $env:GITHUB_ENV
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Apps & Create Shortcuts
        run: |
          Write-Host "Installing Apps..."

          # Audio driver for screen recording audio
          choco install vb-cable -y --no-progress --ignore-checksums

          # Core apps
          choco install winrar -y --no-progress
          choco install googlechrome -y --no-progress --ignore-checksums
          choco install brave -y --no-progress
          choco install ffmpeg -y --no-progress

          # Fix Brave (move to public folder)
          $BraveAdmin = "C:\Users\runneradmin\AppData\Local\BraveSoftware"
          if (Test-Path $BraveAdmin) {
              Copy-Item -Path $BraveAdmin -Destination "C:\" -Recurse -Force
          }

          # Create Desktop Shortcuts
          $WshShell = New-Object -comObject WScript.Shell

          # Brave Shortcut
          $BraveLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")
          $BraveLnk.TargetPath = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"
          $BraveLnk.Save()

          # Chrome Shortcut
          $ChromeLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Google Chrome.lnk")
          $ChromeLnk.TargetPath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $ChromeLnk.Save()

          # WinRAR Shortcut
          $RarLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\WinRAR.lnk")
          $RarLnk.TargetPath = "C:\Program Files\WinRAR\WinRAR.exe"
          $RarLnk.Save()

          Write-Host "Installation and shortcuts complete."

      - name: Start Pinggy Tunnel & Maintain Connection
        run: |
          # Download the official Pinggy client if not present
          if (!(Test-Path "pinggy.exe")) {
              Write-Host "Downloading Pinggy client..."
              Invoke-WebRequest -Uri "https://github.com/pinggyio/pinggy/releases/latest/download/pinggy.exe" -OutFile "pinggy.exe"
          }

          # Start the TCP tunnel to localhost:3389
          Write-Host "Starting Pinggy tunnel..."
          $process = Start-Process -FilePath ".\pinggy.exe" `
              -ArgumentList "-p 443 -R0:localhost:3389 tcp@a.pinggy.io" `
              -NoNewWindow `
              -PassThru `
              -RedirectStandardOutput "pinggy_stdout.txt" `
              -RedirectStandardError "pinggy_stderr.txt"

          # Wait for the tunnel URL to appear in stdout
          $address = $null
          $i = 0
          while ($i -lt 150) {  # up to 5 minutes
              if (Test-Path "pinggy_stdout.txt") {
                  $outContent = Get-Content "pinggy_stdout.txt" -Raw
                  # Match the line: Tunnel URL: tcp://xyz.pinggy.link:12345
                  if ($outContent -match "Tunnel URL:\s*(tcp://[^\s]+)") {
                      $address = $matches[1].Trim()
                      break
                  }
              }
              Start-Sleep -Seconds 2
              $i++
          }

          if (-not $address) {
              Write-Host "Tunnel URL not found in stdout. Checking stderr for debug info..."
              if (Test-Path "pinggy_stderr.txt") {
                  Get-Content "pinggy_stderr.txt" | ForEach-Object { Write-Host $_ }
              }
              Write-Error "Failed to obtain Pinggy tunnel address."
              exit 1
          }

          # Display connection details
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $address"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"

          # Keep the runner alive
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Pinggy tunnel is running"
              Start-Sleep -Seconds 300
          }
